name: CI/CD

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - main

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/placeholder

      - name: Build backend
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/placeholder
          JWT_SECRET: ci-placeholder-secret
          AI_PROVIDER: mistral
          TOGETHER_API_KEY: ci-placeholder-key

      - name: Skip backend tests until a real test suite exists
        run: echo "No backend test suite is configured yet."

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npx eslint .

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://example.com

      - name: Skip frontend tests until a real test suite exists
        run: echo "No frontend test suite is configured yet."

  dependency-scan:
    name: Dependency scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run npm audit for backend
        run: npm audit --audit-level=high
        working-directory: backend
        continue-on-error: true

      - name: Run npm audit for frontend
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  deploy-backend:
    name: Deploy backend to Railway
    runs-on: ubuntu-latest
    needs:
      - backend-ci
      - frontend-ci
      - dependency-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend service
        run: railway up backend --service backend --path-as-root --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

  deploy-frontend:
    name: Deploy frontend to Railway
    runs-on: ubuntu-latest
    needs:
      - deploy-backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend service
        run: railway up frontend --service frontend --path-as-root --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
